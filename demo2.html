<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Konkhmer+Sleokchher&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <style>
      @font-face {
        font-family: "title";
        src: url("fonts/Moulpali-Regular.ttf");
      }
      h2 {
        font-family: "title";
      }
      h1 {
        /* font-family: "Khmer OS Muol Light"; */
        font-family: "Konkhmer Sleokchher", system-ui;
        font-weight: 400;
        font-style: normal;
      }
      .box {
        width: 550px;
        height: 350px;
        background-color: blue;
        color: white;
        text-align: center;
      }
      @media screen and (max-width: 1200px) {
        .box {
          width: 250px;
          background-color: brown;
        }
      }
      @media screen and (max-width: 720px) {
        .box {
          width: 250px;
          height: 200px;
          background-color: rgb(11, 251, 143);
        }
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>ហេឡូ សួស្តី</h1>
      <h2>ហេឡូ សួស្តី</h2>
      <h2>Layout Responsive</h2>
      <h3>Good Morning</h3>
      <p>Hello Everybody!</p>
    </div>
  </body>
</html>
