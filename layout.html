<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home Page</title>
    <style>
      * {
        margin: 0px;
        background-color: rgb(234, 238, 238);
      }
      #layout {
        width: 1150px;
        height: auto;
        background-color: white;
        margin: 0px auto;
        box-shadow: 0px 0px 5px rgb(240, 251, 153);
      }
      #banner {
        width: 1150px;
        height: 300px;
        background-color: rgb(182, 251, 162);
      }
      #menu {
        width: 1150px;
        height: 50px;
        background-color: rgb(162, 214, 251);
      }
      #main_content {
        width: 1150px;
        height: auto;
        background-color: rgb(221, 251, 162);
      }
      #footer {
        width: 1150px;
        height: 150px;
        background-color: rgb(176, 173, 173);
        clear: both;
      }
      #content {
        width: 850px;
        height: auto;
        background-color: rgb(203, 222, 3);
        float: left;
      }
      #adv {
        width: 300px;
        height: auto;
        background-color: rgb(87, 222, 3);
        float: left;
      }
      .items {
        width: 250px;
        height: 250px;
        /* background-color: rgb(227, 225, 223); */
        padding: 5px;
        margin: 5px;
        float: left;
        text-align: center;
        font-size: 20px;
        box-shadow: 1px 1px 5px rgb(160, 240, 30);
      }
      .items:hover {
        box-shadow: 1px 1px 5px black;
      }
      .model {
        text-shadow: 1px 1px 3px red;
      }
    </style>
  </head>
  <body>
    <div id="layout">
      <div id="banner">Banner</div>
      <div id="menu">Menu</div>
      <div id="main_content">
        <div id="content">
          <div class="items">
            <img src="img/msi.png" width="200px" />
            <p>Model: <span class="model"> MIS 2026 </span></p>
            <p>Price: <span class="model"> 1620 $ </span></p>
            <a href="">Detail</a>
          </div>
        </div>
        <div id="adv">News</div>
      </div>
      <div id="footer">Footer</div>
    </div>
  </body>
</html>
